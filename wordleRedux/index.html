    <style>
      body {
        font-family: Verdana, Geneva, Tahoma, sans-serif;

      #boardframe {
        width: 305px;

      }
      .letterBox {

  <body>
    <h1>Wordle</h1>

    <!--  ++++++++++++++++++++++++++++++++++++++  html/CSS / dom / what you see on the page -->

    <div id="wordle"></div>
    <div id="usedLetters"></div>
    <script>
      // ++++++++++++++++++++++++++++++++++++++ data that drives changes
      // get random word from list for answer & previous guesses, can use push, order matters = array * set guess limit & make an object  each letter-> place

      var answer = "moody"; // wordle genius!
      var guesses = ["might", "flood", "stray"];

      // ++++++++++++++++++++++++++++++++++++++ functions

      // ++++++++++++++++++++++++++++++++++++++ create board
      //  6 rows of 5 empty box object - use nested arrays to make the board - array of rows array of object boxes

      function createEmptyBoard() {
        var board = [];
        for (var r = 0; r < 6; r++) {
          //rows that make the board
          var row = [];
          for (var b = 0; b < 5; b++) {
            //empty boxes that fill the row
            row.push(new Box("", ""));
          }
          board.push(row);
        }
        return board;
      }
      //console.log(row)
      //create an object that has the letter and color
      function Box(letter, color) {
        this.letter = letter;
        this.color = color;
      }
      //console.log(Box)

      //REDUX COMPARE GUESS
      function compareGuess(guess, answer) {
        //  compare guess to answer, assign colors  (green correct spot, yellow wrong spot, grey not in word), handle duplicates
        var result = [];
        var answerArr = answer.split(""); // have to split the answer cuz it will be changed/modified
        for (var i = 0; i < 5; i++) {
          if (guess[i] === answerArr[i]) {
            result[i] = "green";
            answerArr[i] = null; // don't use again it's continue in the second loop and leaves
          }
        }

        // then do a second loop to check for yellow and grey & skip anything green & remove used letter from matching again
        for (var i = 0; i < 5; i++) {
          if (result[i]) continue; //has a value - green - so skip the loop
          var index = answerArr.indexOf(guess[i]);
          if (index !== -1) {
            // double negative means it exists
            result[i] = "yellow";
            answerArr[index] = null; // hits continue and leaves
          } else {
            result[i] = "gray";
          }
        }
        return result;
      }

      //  +++++++------------------ Update the board apply guesses to board
      // goes row by row inserting letter and color to boxes using r & b as indexes for row and box

      function updateBoard(board) {
        for (var r = 0; r < guesses.length; r++) {
          //all the guesses cuz they're preloaded
          var guess = guesses[r]; // the word in this row
          var result = compareGuess(guess, answer); // receives the returned variable from compareGuess / different scope

          for (var b = 0; b < 5; b++) {
            board[r][b].letter = guess[b]; // update the empty box with the letter using index
            board[r][b].color = result[b]; // update the empty box with the color using index
          }
        }
      }
      // used letters using an object for letter : "color"
      function createUsedLetters(guesses, answer) {
        var used = {};

        for (var r = 0; r < guesses.length; r++) {
          var guess = guesses[r];
          var result = compareGuess(guess, answer); //["color","color","color","color","color"] of guess

          for (var b = 0; b < 5; b++) {
            // loops through each leter
            var letter = guess[b];
            var color = result[b];

            if (color === "green") {
              // creates a hierachy of applied color
              used[letter] = "green";
            } else if (color === "yellow") {
              if (used[letter] !== "green") {
                used[letter] = "yellow";
              }
            } else {
              if (!used[letter]) {
                used[letter] = "grey";
              }
            }
          }
        }

        return used; // returns the object with the letter and color to react to be used for the display
      }

      // // }
      // //
      // //    function createUsedLetters(Board()) {
      // //    // create the alphabet board, wipe old,use a string for the letters looping through and create one box per letter
      // //    var used = {};
      // //    used.innerHTML = "";
      // //    letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      // //                      //
      // //                      //   used.innerHTML +=
      // //                      //     "<div class='letterBox' id='letter" +
      // //                      //     letters[i] +
      // //                      //     "'>" +
      // //                      //     letters[i] +
      // //                      //     "</div>";
      //    }   }
      // display the colored used letters
      function displayUsedLetters(used) {
        var letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        var boxes = letters.split("").map(function (letter, i) {
          // split the string and map the letter and index into boxes
          var color = used[letter.toLowerCase()]; // looks up color by index of the object.  * hours spent here.  ALays the stupid stuff!

          return React.createElement(
            "div",
            {
              className: "letterBox",
              key: i,
              style: { backgroundColor: color },
            },
            letter,
          );
        });
        return React.createElement("div", null, boxes);
      }

      // //          //   function displayBoard() {
      // //          //   var rows = board.map(function (row, rIdx) {
      // //          //     // loops through each row

      // //          //       return React.createElement(
      // //          //         "div",
      // //          //         {
      // //          //           className: "place",
      // //          //           key: bIdx,
      // //          //           style: { backgroundColor: box.color },
      // //          //         },
      // //          //         box.letter,
      // //          //       );
      // //          //     });

      // //          //     return React.createElement(
      // //          //       "div",
      // //          //       { className: "row", key: rIdx },
      // //          //       boxes,
      // //          //     );
      // //          //   });

      //            return React.createElement("div", { id: "usedLetters" }); //data
      //            usedRoot.render(displayUsedLetters(usedLetters)) //UI
      // }
      // ---------------------- Display  board

      // // GOAL: to return the react element/ makes UI - the nexted map == nested arrays in the board
      function displayBoard() {
        var rows = board.map(function (row, rIdx) {
          // loops through each row and key
          var boxes = row.map(function (box, bIdx) {
            //and box
            return React.createElement(
              "div",
              {
                className: "place",
                key: bIdx,
                style: { backgroundColor: box.color },
              },
              box.letter,
            );
          });

          return React.createElement(
            "div",
            { className: "row", key: rIdx },
            boxes,
          );
        });

        return React.createElement("div", { id: "boardframe" }, rows); //boardframe gives the whole frame, thought it should just be board
      }

      //---------------------------- Feed React

      var board = createEmptyBoard();
      updateBoard(board);

      var usedLetters = createUsedLetters(guesses, answer);
      console.log(usedLetters);

      var usedRoot = ReactDOM.createRoot(
        document.getElementById("usedLetters"),
      );
      usedRoot.render(displayUsedLetters(usedLetters)); // passes usedLetters into fx displayUL

      var root = ReactDOM.createRoot(document.getElementById("wordle"));
      root.render(displayBoard()); // don't need to fill cuz it's the global
    </script>
