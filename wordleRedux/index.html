    function compareGuess(guess, answer) {
        //  compare guess to answer, assign colors  (green correct spot, yellow wrong spot, grey not in word), handle duplicates
        var result = [];
        var answerArr = answer.split("");
        for (var i = 0; i < 5; i++) {
          if (guess[i] === answerArr[i]) {
            result[i] = "green";
            answerArr[i] = null;
          }
        }

          for (var i = 0; i < 5; i++) {
          if (result[i]) continue;
          var index = answerArr.indexOf(guess[i]);
          if (index !== -1) {
            result[i] = "yellow";
            answerArr[index] = null; //
          } else {
            result[i] = "gray";
          }
        }
        return result;
      }
