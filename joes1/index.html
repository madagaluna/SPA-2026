      //3. redo 1 and 2, use a fx METHOD to create a class to store menu.  Create an array of 4 instances of the class (one for each food item 174

      function MenuItem(name, price) {
        // class is a blueprint|recipe  (notes for myself)
        this.name = name;
        this.price = price;

        this.show = function () {
          return this.name + " $" + this.price; //using show method - takeaway: objects can have both properties and methods
        }; //end show
      } // end function

      //instance the class using NEW for each food iteam
      var menu = [
        new MenuItem("hotdog", 4),
        new MenuItem("fries", 3.5),
        new MenuItem("soda", 1.5),
        new MenuItem("sauerkraut", 1),
      ];

      // display the menu

      document.write("This uses a class:" + "<br>");
      menu.forEach(function (item) {
        document.write(item.show() + "<br>");
      });

      document.write("<hr>");

      // 1.  create and display associative called menu of items (name, price) slide 155
      menu = [];
      menu["hotdog"] = 4.0;
      menu["fries"] = 3.5;
      menu["soda"] = 1.5;
      menu["sauerkraut"] = 1;

      document.write("This uses an associative array:" + "<br>");
      for (key in menu) document.write(key + " $" + menu[key] + "<br>");
      document.write(
        "Associative arrays only count numeric indexes (tic-Tic-tac-toe), not strings (labels) so 'menu.length' = " +
          menu.length +
          "<br>",
      );
      document.write(
        "Associative arrays are good for ordered list and if you care about position like in Tic-tac-toe " +
          "<br>",

      //** 2. redo part 1 using an object called menu to store and display the menu  items(name,price) slide 157
      var menu = {
        hotdog: 4.0,
        fries: 3.5,
        soda: 1.5,
        sauerkraut: 1,
      };
      document.write("This uses an object:" + "<br>");
      for (key in menu) document.write(key + " $" + menu[key] + "<br>");
      document.write(
