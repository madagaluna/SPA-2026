<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joes2</title>
    <head>
      <style>
      body {
        font-family: Verdana, Geneva, Tahoma, sans-serif;
      }
      #mainFrame {
        background-color: rgb(184, 37, 3);
        width: 500px;
        height: 700px;
        border: 2px solid #333;
        margin: auto; /*centered the mainframe - it's fixed width */
      }

      h1 {
        display: block;
        background-color: rgb(240, 154, 42);
        border: 1px dotted #333;
        width: 350px;
        text-transform: uppercase;
        color: #333;
        font-weight: 600;
        text-align: center;
        padding: 15px 0 15px 0;
        box-sizing: border-box;
        margin: 25px auto 15px auto;
      }
    
      #menu {
        /* nee square */
        display: block; /* wraps the boxes bases on frame width */
        background-color:rgb(240, 154, 42);
         /* gives the text a height to be centered on */
        text-align: center; /*keeps x and 0's in the center, not on the left */
         /* vertical-align: top; /* keeps the squares horizontally ? alligned - aligned to the top */
        color: #333;
        font-size: 20px;
        
     
        box-sizing: border-box; /* tightens the borders by including padding and te xt */
        margin: 20px 
    
      }
   #cart {
        /* nee square */
        display: block; /* wraps the boxes bases on frame width */
        background-color: rgb(159, 156, 152);
         /* gives the text a height to be centered on */
        text-align: center; /*keeps x and 0's in the center, not on the left */
         /* vertical-align: top; /* keeps the squares horizontally ? alligned - aligned to the top */
        color: #333;
        font-size: 20px;
        
     
        box-sizing: border-box; /* tightens the borders by including padding and te xt */
        margin: 20px 
      }
     #menuSelect {
 
        display: block;
         background-color:rgb(240, 154, 42);
         /* gives the text a height to be centered on */
        text-align: center; /*keeps x and 0's in the center, not on the left */
         /* vertical-align: top; /* keeps the squares horizontally ? alligned - aligned to the top */
        color: #333;
        font-size: 20px;
         margin: auto;
     
        box-sizing: border-box; 
        margin: 20px 
      }
 
      input[type="button"] {
        font-family:
          Verdana, Geneva, Tahoma, sans-serif; 
        display: inblock;
        background-color: rgb(159, 156, 152);
        color: rgb(184, 37, 3);
        border: 1px solid #333;
        font-size: 25px;
        width: 215px;
        text-transform: uppercase;
        font-weight: 600;
        text-align: center;
        padding: 15px;
        box-sizing: border-box;
        margin: auto auto auto 20px;
        vertical-align: bottom;
      }

      input[type="button"]:hover {
        background-color: #010104;
        color: #fff;
      }
      </style>
  </head>
  <body>
    <div id="mainFrame">
      <h1>JOE'S HOTDOG STAND</h1>
      <div id="menu"></div>  
      
       <select id="menuSelect"></select>
      <input type="button" value="add To Cart" id="addBtn">
      
      <div id="cart"></div>
      <input type="button" value="checkout" id="checkoutbtn">

    <script>
      // --
      // ---------------------------------------- VARIABLES THAT CHANGE
      //s
      // selected items - initialized to 0
       cart = {
        hotdog: 0,
        fries: 0,
        soda: 0,
        sauerkraut: 0,
      };

  

      // ---------------------------------------Data

      const menu = {
        hotdog: 4.0,
        fries: 3.5,
        soda: 1.5,
        sauerkraut: 1,
      };


      // --==================================--  Functions

     // menu display OBJECT to show item names and prices 
      function displayMenu()
{
  var menuSection = document.getElementById("menu");
  menuSection.innerHTML = "<h2>Menu</h2>";

  for (var key in menu) 
  {
    menuSection.innerHTML += key.toUpperCase() + " $" + menu[key] + "<br>";
  }
}


 // the dropdown for selecting the item -clears it then loops through the OBJECT and adds <option> for each menu item 
function SelectItem() 
{
  var item = document.getElementById("menuSelect");
  item.innerHTML = "";

  for (var key in menu)
   {
    item.innerHTML += "<option value='" + key + "'>" +
                     key.toUpperCase()  + " $" + menu[key] +
                     "</option>";
  }
}
// display cart showing only the items that have been selected - loops through looking for quantities > 0

function displayCart() {
  var cartSection = document.getElementById("cart");
  cartSection.innerHTML = "<h2>Shopping Cart</h2>";

  for (var key in cart) {
    if (cart[key] > 0) {
      cartSection.innerHTML += key + " x " + cart[key] + "<br>";
    }
  }
}



// add to cart - gets item by ID and increments by 1 

  function addToCart() 
{
  var selectedkey = document.getElementById("menuSelect").value;
  cart[selectedkey]++;
  displayCart();
}



// checkout total using the same key

function checkout() {
  var receipt = "";
  var total = 0;

  for (var key in cart) {
    if (cart[key] > 0) {
      var keyTotal = cart[key] * menu[key];
      receipt += key + " x " + cart[key] + " = $" + keyTotal + "\n";
      total += keyTotal;
    }
  }

  receipt += "\nTotal = $" + total;
  alert(receipt);

  for (var key in cart) {
    cart[key] = 0;
  }

  displayCart();
}

      // ---------------------------------------- ONLOAD
    //runs after load
      window.onload= function(){
        displayMenu();
        SelectItem();
        document.getElementById("addBtn").onclick = addToCart;
        document.getElementById("checkoutbtn").onclick = checkout;

      }
    
    </script>
    </div>
  </body>
</html>
