<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Component Demo</title>
    <style type="text/css">
      .nums {
        border: 1px solid #34b078;
        padding: 10px;
        width: 80px;
        height: 80px;
        border: 1px solid black;
        text-align: center;
        display: inline-block;
      }
      .block:hover {
        opacity: 0.3;
      }
      .black {
        background-color: black;
      }
      .mustard {
        background-color: rgb(181, 161, 7);
      }
      .red {
        background-color: red;
      }

      .blue {
        background-color: blue;
      }
    </style>
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.development.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>

  <body>
    <div id="root"></div>
    <!-- placeholder for React DOM -->

    <script type="text/babel">
      //-------------------------------DATA

      const nums = [
        { num: 7, color: "black" },
        { num: 8, color: "blue" },
        { num: 9, color: "red" },
        { num: 4, color: "mustard" },
        { num: 5, color: "black" },
        { num: 6, color: "blue" },
        { num: 1, color: "red" },
        { num: 2, color: "mustard" },
        { num: 3, color: "black" },
      ];

      //-------------------------------component

      function Block({ num, color }) {
        const handleClick = () => alert(num);

        return (
          <div className={"block " + color} onClick={handleClick}>
            {num}
          </div>
        );
      }

      function App() {
        return (
          <div>
            {nums.map((b, idx) => (
              <Block key={idx} num={b.num} color={b.color} />
            ))}
          </div>
        );
      }

      //-------------------------------render

      const myroot = ReactDOM.createRoot(document.getElementById("root"));
      myroot.render(<App />);
    </script>
  </body>
</html>
