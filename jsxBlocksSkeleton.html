<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Component Demo</title>
    <style type="text/css">
      .frame {
        width: 240px;
        height: 240px;
        border: 2px solid #333;
        margin: auto; /*centered the mainframe - it's fixed width */
      }

      .block {
        display: inline-block; /* wraps the boxes bases on frame width */
        background-color: rgb(159, 156, 152);
        line-height: 80px; /* gives the text a height to be centered on */
        text-align: center; /*keeps x and 0's in the center, not on the left */
        vertical-align: top; /* keeps the squares horizontally ? alligned - aligned to the top */
        color: #ded5d5;
        font-size: 50px;
        width: 80px;
        height: 80px;
        border: 2px solid black;
        box-sizing: border-box; /* tightens the borders by including padding and te xt */
        margin: auto;
        padding: 5px;
      }

      .block:hover {
        opacity: 0.3;
      }
      .black {
        background-color: black;
      }
      .mustard {
        background-color: rgb(181, 161, 7);
      }
      .red {
        background-color: red;
      }

      .blue {
        background-color: blue;
      }
    </style>
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.development.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>

  <body>
    <div id="root"></div>
    <!-- placeholder for React DOM -->

    <script type="text/babel">
      //-------------------------------DATA

      const nums = [
        { num: 7, color: "black" },
        { num: 8, color: "blue" },
        { num: 9, color: "red" },
        { num: 4, color: "mustard" },
        { num: 5, color: "black" },
        { num: 6, color: "blue" },
        { num: 1, color: "red" },
        { num: 2, color: "mustard" },
        { num: 3, color: "black" },
      ];

      //-------------------------------component

      function Block({ num, color }) {
        const handleClick = () => alert(num);

        return (
          <div className={"block " + color} onClick={handleClick}>
            {num}
          </div>
        );
      }

      function App() {
        return (
          <div className="frame">
            {nums.map((b, idx) => (
              <Block key={idx} num={b.num} color={b.color} />
            ))}
          </div>
        );
      }

      //-------------------------------render

      const myroot = ReactDOM.createRoot(document.getElementById("root"));
      myroot.render(<App />);
    </script>
  </body>
</html>
