The board:
The screenshot is a model of how your implementation should appear.  You are welcome to add enhancements as long as you meet the requirements.  Note:  Use an input box to enter the guess – this deviates from the NY Times version.
 

 
Used letter board:
You will need to display a used letter board indicating letters used.  The used letter board must include a visual indicator of whether the used letter was correct/in the wrong place/ or not in the word.  An example is shown below.  Note, the color reflects “green” if any guess shows the letter in the right place.

 



Game play:
The player has 6 tries to guess a 5 letter word.
Guesses must be 5 letter words (you will need to validate this)
For each letter in the guess, you must report one of three results: 
if the letter is not in the answer (grey)
if the letter is in the answer but in a different place than in your guess word (yellow)
if the letter is in the same place as in the guess word (green)


The game ends when the user guesses the word or uses all 6 guesses.

Note:  If a letter appears twice in the guess but only once in the answer, you must eliminate all possible yellow/green responses and then consider any repeat letters.
For example – if the answer is “create” and the guess is “tacit”
t is yellow
a is yellow
c is yellow
i is grey
t is grey
 
Required Features:
•	Display a used letter board so that the user can avoid letters that have been eliminated.
•	Include a “debug” mode that displays the answer in the console so that it is easier to check correct operation.
•	Allows the user to play multiple games – i.e., you need to handle restarting the game.
•	Responsive to tablet size (down to 700px)
