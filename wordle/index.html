<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Wordle</title>
    <style>
      body,
      h1 {
        font-family: Cambria, Cochin, Georgia, Times, "Times New Roman", serif;
        text-align: center;
        background-color: #8492fb;
        color: #0d133f;
        font-weight: 900;
        font-size: 900;
      }

      #boardframe {
        width: 305px;
        height: 375px;
        border: 1px solid #333;
        margin: 60px auto;
        background-color: #a0a9ee;
      }

      #usedLetters {
        width: 450px;
        height: 250px;
        border: 1px solid #333;
        margin: 100px auto;
        padding: 10px;
        background-color: #a0a9ee;
        font-size: larger;
        text-align: center;
      }
      #enterGuess {
        margin: 20px;
      }

      #board {
        margin: 10px;
      }

      #usedLetters {
        margin-top: 20px;
      }
      .letterBox {
        display: inline-block;
        width: 50px;
        height: 50px;
        line-height: 50px;
        border: 1px solid #333;
        margin-top: 5px;
        font-size: 30px;
        text-align: center;

        background-color: #a0a9ee;
      }

      .place {
        display: inline-block;
        width: 45px;
        height: 45px;
        line-height: 45px;
        border: 1px solid #333;
        margin: 2px;
        text-transform: uppercase;
        font-weight: bold;
        color: black;
        border-radius: 5px; /* good old rounded corners */
      }

      .row {
        margin: 5px;
      }

      #enterGuess,
      #restartBtn,  /* comm = both - more next week*/
      #submitBtn {
        height: 45px;
        width: 175px;
        margin: 2px;
        text-transform: uppercase;
        font-weight: bold;
        font-size: large;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <h1>Wordle</h1>

    <!--  ++++++++++++++++++++++++++++++++++++++  html/CSS / dom / what you see on the page -->

    <div id="frame">
      <div id="boardframe">
        <div id="board"></div>
      </div>
      <div id="message"></div>
      <input type="text" id="enterGuess" maxlength="5" />
      <input type="button" id="submitBtn" value="Guess" />
      <input type="button" id="restartBtn" value="Restart Game" />
      <div id="usedLetters"></div>
    </div>

    <script>
      // ++++++++++++++++++++++++++++++++++++++ data that drives changes
      // get random word from list for answer & previous guesses, can use push, order matters = array * set guess limit & make an object  each letter-> place
      var wordList = [
        "SLATE",
        "APPLE",
        "BASIC",
        "FREAK",
        "BRAVE",
        "BRICK",
        "BRING",
        "CANDY",
        "CARRY",
        "CLEAN",
        "CLEAR",
        "CLOUD",
        "DAILY",
        "DANCE",
        "DRINK",
        "DRIVE",
        "DREAM",
        "EARLY",
        "EARTH",
        "ENJOY",
        "ENTER",
        "EVERY",
        "FAITH",
        "FIELD",
        "FINAL",
        "FIRST",
        "FLAME",
        "GIANT",
        "GRASS",
        "GREEN",
        "GROUP",
        "GUARD",
        "HAPPY",
        "HEART",
        "HONEY",
        "HOUSE",
        "HUMAN",
        "LIGHT",
        "LUCKY",
        "MAGIC",
        "MIGHT",
        "MONEY",
        "NORTH",
        "OCEAN",
        "POWER",
        "QUIET",
        "RIVER",
        "SMILE",
        "SOUND",
        "STORM",
        "WATER",
        "WORLD",
        "LOSER",
        "PSYCH",
        "FREAK",
        "FJORD",
        "PIXIE",
        "KAZOO",
        "VICIA",
        "CRAIC",
        "ERGOT",
        "GNOME",
        "OUZEL",
        "JOUST",
        "ILLUM",
        "SKULK",
        "BIMBO",
        "BALSA",
        "QUAFF",
        "YAKKA",
        "PRONK",
        "GNARR",
        "SINNI",
        "GLOAM",
        "KNURR",
        "QUIRK",
        "TRAIT",
        "SLANG",
        "WEIRD",
        "PSHAW",
        "FUNNY",
      ];
      var answer = getRandomWord();
      var guesses = [];
      var guessesLeft = 6;
      var usedLetters = {};
      var gameOver = false;

      //  ++++++++++++++++++++++++++++++++++++++ onload

      window.onload = function () {
        createBoard();
        createUsedLettersBoard();
        enableInput();
        document.getElementById("submitBtn").onclick = handleSubmit;
        document.getElementById("restartBtn").onclick = resetGame;
      };

      // ++++++++++++++++++++++++++++++++++++++ functions

      // get the word
      function getRandomWord() {
        var index = Math.floor(Math.random() * wordList.length);
        return wordList[index];
      }

      // clears the board then creates 6 rows with 5 empty boxes
      function createBoard() {
        var board = document.getElementById("board");
        board.innerHTML = "";
        for (i = 0; i < 6; i++) {
          board.innerHTML +=
            "<div class='row' id='row" +
            i +
            "'>" +
            "<div class='place'></div>".repeat(5) +
            "</div>";
        }
      }

      function createUsedLettersBoard() {
        // create the alphabet board, wipe old,use a string for the letters looping through and create one box per letter
        var used = document.getElementById("usedLetters");
        used.innerHTML = "";
        letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        for (i = 0; i < letters.length; i++) {
          used.innerHTML +=
            "<div class='letterBox' id='letter_" +
            letters[i] +
            "'>" +
            letters[i] +
            "</div>";
        }
      }
      // get  the word from input box amd make uppercase
      function getGuess() {
        guess = document.getElementById("enterGuess").value;
        return guess.toUpperCase();
      }
      //game is still going, word is right length, made of letters - if all true return true or else show message
      function validateGuess(guess) {
        if (gameOver) {
          showMessage("Game is over.");
          // stop if game already ended
          return false;
        }
        if (guess.length !== 5) {
          showMessage("Guess must be 5 letters.");
          return false;
        }
        // only letters A–Z
        if (!/^[A-Z]+$/.test(guess)) {
          showMessage("Guess must contain letters only.");
          return false;
        }
        return true;
      }
      function compareGuess(guess, answer) {
        //  compare guess to answer, assign colors  (green correct spot, yellow wrong spot, grey not in word), handle duplicates
        var result = [];
        var answerArr = answer.split("");
        for (var i = 0; i < 5; i++) {
          if (guess[i] === answerArr[i]) {
            result[i] = "green";
            answerArr[i] = null;
          }
        }

        // then do a second loop to check for yellow and grey & skip anything green & remove used letter from matching again
        for (var i = 0; i < 5; i++) {
          if (result[i]) continue;
          var index = answerArr.indexOf(guess[i]);
          if (index !== -1) {
            result[i] = "yellow";
            answerArr[index] = null; //
          } else {
            result[i] = "gray";
          }
        }
        return result;
      }
      // +++++++------------------ Update the board
      // get current row, put letter and color in box
      function addRow(guess, result) {
        var rowIndex = guesses.length;
        var row = document.getElementById("row" + rowIndex);
        var boxes = row.children;
        for (var i = 0; i < 5; i++) {
          boxes[i].innerText = guess[i];
          boxes[i].style.backgroundColor = result[i];
        }
      }
      // +++++++++++++----+++-- apply the colors
      // get the letter box & change letter color depending on match &  apply backcolor in  the boxes

      function addUsedLetters(guess, result) {
        for (i = 0; i < 5; i++) {
          var letter = guess[i];
          var box = document.getElementById("letter_" + letter);

          if (result[i] === "green") {
            usedLetters[letter] = "green";
          } else if (
            result[i] === "yellow" &&
            usedLetters[letter] !== "green"
          ) {
            usedLetters[letter] = "yellow";
          } else if (
            result[i] === "gray" &&
            usedLetters[letter] !== "green" &&
            usedLetters[letter] !== "yellow"
          ) {
            usedLetters[letter] = "gray";
          }

          box.style.backgroundColor = usedLetters[letter];
        }
      }

      // set up the API using fetch with respons.json to parse  the API response to an object

      function checkWord(word) {
        return fetch(
          "https://api.dictionaryapi.dev/api/v2/entries/en/" +
            word.toLowerCase(),
        )
          .then(function (response) {
            if (!response.ok) return false;
            return response.json().then(function (data) {
              return true;
            });
          })
          .catch(function () {
            return false;
          });
      }
      console.log(answer);
      //get guess, validate, check if real word, compare to answer, update board and used letters, push guess, decrease guessesLeft, check win/loss, disable if over, send message
      function handleSubmit() {
        var guess = getGuess();
        if (!validateGuess(guess)) return;

        checkWord(guess).then(function (valid) {
          if (!valid) {
            showMessage("Enter a valid word.");
            document.getElementById("enterGuess").value = ""; // working - needed quotes :/
            return;
          }

          var result = compareGuess(guess, answer);
          addRow(guess, result);
          addUsedLetters(guess, result);
          guesses.push(guess);
          guessesLeft--;

          if (guess === answer) {
            gameOver = true;
            disableInput();
            showMessage("You Win!");
            return;
          }

          if (guessesLeft == 0) {
            gameOver = true;
            disableInput();
            showMessage("You Lose! Answer was " + answer);
            return;
          }

          showMessage("Guesses left: " + guessesLeft);

          document.getElementById("enterGuess").value = "";
        });
      }
      //  disable input and enable input

      function disableInput() {
        document.getElementById("enterGuess").disabled = true;
        document.getElementById("submitBtn").disabled = true;
      }

      function enableInput() {
        document.getElementById("enterGuess").disabled = false;
        document.getElementById("submitBtn").disabled = false;
      }
      // Show Message

      function showMessage(msg) {
        document.getElementById("message").innerHTML = msg;
      }

      // reset DATA variables

      function resetGame() {
        guesses = [];
        guessesLeft = 6;
        usedLetters = {};
        gameOver = false;
        answer = getRandomWord();

        // Set up a new Game and clear message and input box - play forever!
        createBoard();
        createUsedLettersBoard();
        enableInput();
        showMessage("");
        console.log("answer is  " + answer);
        document.getElementById("enterGuess").value = "";
      }
    </script>
  </body>
</html>
