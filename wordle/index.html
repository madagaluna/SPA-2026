<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Wordle</title>
    <style>
      body {
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        text-align: center;
      }

      #boardframe {
        width: 305px;
        height: 375px;
        border: 1px solid #333;
        margin: 60px auto;
      }

      /*--  #frame{
        width: 600px;
        height: 600px;
        /* text-align: center; centering the boxes and text in frame/ boxes (child)
        border: 2px solid #868585;
        margin: auto; /*centered in the mainFrame
        box-sizing: border-box; /* maths padding, etc

      } */
      #enterGuess {
        margin: 20px;
      }

      #board {
        margin: 10px;
      }

      #usedLetters {
        margin-top: 20px;
      }
      .letterBox {
        display: inline-block;
        width: 30px;
        height: 30px;
        line-height: 30px;
        border: 1px solid #333;
        margin-top: 5px;
        font-size: 14px;
      }

      .place {
        display: inline-block;
        width: 45px;
        height: 45px;
        line-height: 45px;
        border: 1px solid #333;
        margin: 2px;
        text-transform: uppercase;
        font-weight: bold;
      }

      .row {
        margin: 5px;
      }

      #restartBtn,  /* comm = both*/
      #submitBtn {
        margin: 2px;
        text-transform: uppercase;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <h1>Wordle</h1>

    <!--  ++++++++++++++++++++++++++++++++++++++  html/CSS / dom -->

    <input type="text" id="enterGuess" maxlength="5" />
    <!-- limit length here and check length -->
    <input type="button" id="submitBtn" value="Guess" />
    <input type="button" id="restartBtn" value="Restart Game" />
    <div id="message"></div>
    <div id="frame">
      <div id="boardframe">
        <div id="board"></div>
      </div>

      <div id="usedLetters"></div>
    </div>

    <script>
      // ++++++++++++++++++++++++++++++++++++++ data
      var answer = "TATAT"; // use API? - string means can use .length, [i] === includes
      var guesses = []; //previous guesses, can use push, order matters = array
      var guessesLeft = 6;
      var usedLetters = {}; //object  each letter-> place
      var gameOver = false;

      //  ++++++++++++++++++++++++++++++++++++++ onload

      window.onload = function () {
        createBoard();

        createUsedLettersBoard();

        // attach click handlers to the button
        document.getElementById("submitBtn").onclick = handleSubmit;
        document.getElementById("restartBtn").onclick = resetGame;

        // CHECK shows answer in console
        console.log("show answer:", answer);
      };

      // ++++++++++++++++++++++++++++++++++++++ functions

      // creates 6 rows (change line to row?)
      function createBoard() {
        var board = document.getElementById("board");
        // for each, clear any existing content
        board.innerHTML = "";
        for (i = 0; i < 6; i++) {
          // give each row a unique id use innerHTML**
          board.innerHTML += "<div class='row' id='row" + i + "'></div>";
        }
      }

      function createUsedLettersBoard() {
        // create the alphabet board
        var used = document.getElementById("usedLetters");
        used.innerHTML = "";

        // use a string for the letters looping through
        letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        // create one box per letter
        for (i = 0; i < letters.length; i++) {
          used.innerHTML +=
            "<div class='letterBox' id='letter_" +
            letters[i] +
            "'>" +
            letters[i] +
            "</div>";
        }
      }
      // get  the word/ value from input box amd make uppercase
      function getGuess() {
        guess = document.getElementById("enterGuess").value;
        return guess.toUpperCase();
      }

      //validateGuess()
      // if length !== 5, reject
      // if !letters, reject
      // if gameOver= true, reject
      // verify that it's 5 letters - make sure the game isn't ended first
      function validateGuess(guess) {
        if (gameOver) {
          showMessage("Game is over.");
          // stop if game already ended
          console.log("Game is over.");
          return false;
        }
        if (guess.length !== 5) {
          console.log("Guess must be 5 letters.");
          return false;
        }
        // only letters A–Z
        if (!/^[A-Z]+$/.test(guess)) {
          showMessage("Guess must contain letters only.");
          return false;
        }

        return true;
      }
      function compareGuess(guess, answer) {
        // array to store color results
        var result = [];
        //find duplicates -string -> array (to modify and track)
        var answerArr = answer.split("");

        // check for correct pos and place
        for (var i = 0; i < 5; i++) {
          if (guess[i] === answerArr[i]) {
            result[i] = "green";
            answerArr[i] = null; // mark as used
          }
        }

        // check for yellow and grey
        for (var i = 0; i < 5; i++) {
          if (result[i]) continue; // skip anything green
          var index = answerArr.indexOf(guess[i]);
          if (index !== -1) {
            result[i] = "yellow";
            answerArr[index] = null; // removed this letter from matching
          } else {
            result[i] = "gray";
          }

          if (guess[i] === answer[i]) {
            result.push("green");
            // correct letter in wrong position
          } else if (answer.includes(guess[i])) {
            result.push("yellow");

            // letter not in word
          } else {
            result.push("gray");
          }
        }

        return result;
      }
      // +++++++------------------ Update the board
      function addRow(guess, result) {
        // determine which row to fill based on guesses so far

        var rowIndex = guesses.length;
        var row = document.getElementById("row" + rowIndex);
        // clear row before inserting boxs
        row.innerHTML = "";
        // create  and place letter in 5 boxes
        for (i = 0; i < 5; i++) {
          row.innerHTML +=
            "<div class='place' style='background-color:" +
            result[i] +
            ";'>" +
            guess[i] +
            "</div>";
        }
      }
      // +++++++++++++----+++-- apply the colors Colors

      function addUsedLetters(guess, result) {
        for (i = 0; i < 5; i++) {
          var letter = guess[i];
          // get the letter box
          var box = document.getElementById("letter_" + letter);
          // change leetter color depending on match

          if (result[i] === "green") {
            usedLetters[letter] = "green";
          } else if (
            result[i] === "yellow" &&
            usedLetters[letter] !== "green"
          ) {
            usedLetters[letter] = "yellow";
          } else if (
            result[i] === "gray" &&
            usedLetters[letter] !== "green" &&
            usedLetters[letter] !== "yellow"
          ) {
            usedLetters[letter] = "gray";
          }
          //  apply backcolor in  the boxes
          box.style.backgroundColor = usedLetters[letter];
        }
      }
      // validate the guess,
      function handleSubmit() {
        var guess = getGuess();
        if (!validateGuess(guess)) return;

        //  compare it to the answer, update the board and used letters, push the guess to the array
        var result = compareGuess(guess, answer);
        addRow(guess, result);
        addUsedLetters(guess, result);
        guesses.push(guess);

        // decrease the guessLeft
        guessesLeft--;

        showMessage("Guesses left: " + guessesLeft);
        document.getElementById("enterGuess").value = "";

        //  win/loss
        if (guess === answer) {
          gameOver = true;
          disableInput();
          showMessage("You Win!");
          return;
        }

        if (guessesLeft == 0) {
          gameOver = true;
          disableInput();
          showMessage("You Lose! Answer was " + answer);
          return;
        }
      }
      //  disable input and enable input

      function disableInput() {
        document.getElementById("enterGuess").disabled = true;
        document.getElementById("submitBtn").disabled = true;
      }

      function enableInput() {
        document.getElementById("enterGuess").disabled = false;
        document.getElementById("submitBtn").disabled = false;
      }
      // Show Message

      function showMessage(msg) {
        document.getElementById("message").innerHTML = msg;
      }

      // reset DATA variables

      function resetGame() {
        guesses = [];
        guessesLeft = 6;
        usedLetters = {};
        gameOver = false;
        answer = "SLATE"; // later replace with getWrd()

        // New Game
        createBoard();
        createUsedLettersBoard();
        enableInput();
        showMessage("");
        // clear input box

        document.getElementById("enterGuess").value = "";

        console.log("CHECK answer:", answer);
      }
    </script>

    <script></script>
  </body>
</html>
